<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣國小期末評語生成器 (專業修復版) | Gemini 2.5 Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            sage: '#8E9775',
                            oat: '#EFE9E1',
                            blue: '#95ADBE',
                            rose: '#D4A5A5',
                            clay: '#B08E8E',
                            bg: '#F8F6F2',
                            dark: '#4A5568',
                            custom: '#A3B18A'
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F6F2; color: #4A5568; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .chip-active { background-color: #8E9775 !important; color: white !important; border-color: #8E9775 !important; }
        .chip-custom { background-color: #95ADBE !important; color: white !important; border-color: #95ADBE !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenerativeAI } from '@google/generative-ai';

        // Constants
        const TRAIT_CATEGORIES = [
            { 
                id: 'attitude',
                title: '學習態度', 
                traits: ['積極主動', '專注認真', '思維敏捷', '思慮周祥', '被動謹慎', '需多叮嚀', '求知慾強', '樂於發表', '耐心不足', '作業工整'] 
            },
            { 
                id: 'interpersonal',
                title: '人際與社交', 
                traits: ['溫和友善', '熱心助人', '領導力強', '樂於分享', '害羞內向', '活潑開朗', '合群守法', '善於溝通', '耿直大方', '謙恭有禮'] 
            },
            { 
                id: 'character',
                title: '常規與品格', 
                traits: ['誠實負責', '遵守紀律', '愛惜公物', '沉穩內斂', '粗心大意', '情緒穩定', '尊師重道', '言行一致', '熱心公務', '有禮貌'] 
            },
            { 
                id: 'special',
                title: '特殊表現', 
                traits: ['具藝術天分', '體育表現傑出', '口才流利', '喜愛閱讀', '動手能力強', '音感極佳', '邏輯力強', '擅長數位', '服務熱忱', '創意無限'] 
            }
        ];

        const TONES = [
            { id: 'gentle', label: '溫柔鼓勵', prompt: '溫柔、充滿鼓勵與包容，多發掘孩子的亮點' },
            { id: 'expectant', label: '殷切期盼', prompt: '殷切期盼、具備指引性，溫和地指出可進步的空間並給予方法' },
            { id: 'objective', label: '客觀中肯', prompt: '客觀、中肯、平實地描述學生的具體表現' },
            { id: 'praise', label: '讚賞肯定', prompt: '充滿讚賞與肯定，高度肯定其卓越表現與榜樣作用' },
            { id: 'humorous', label: '幽默風趣', prompt: '語氣輕鬆、幽默風趣，展現親和力與對孩子天性的理解' }
        ];

        const LENGTHS = [
            { id: 'short', label: '50字', value: '50字以內' },
            { id: 'medium', label: '100字', value: '100字左右' },
            { id: 'long', label: '150字', value: '150字以上' }
        ];

        function App() {
            // Global Settings
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [globalLength, setGlobalLength] = useState('medium');
            
            // Core State
            const [students, setStudents] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            
            // UI State
            const [batchText, setBatchText] = useState('');
            const [customTagInput, setCustomTagInput] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const selectedStudent = useMemo(() => 
                students.find(s => s.id === selectedId) || null, 
            [students, selectedId]);

            // Handlers
            const handleBatchImport = () => {
                const names = batchText.split(/[\n\s,]+/).filter(n => n.trim());
                if (names.length === 0) return;
                
                const newStudents = names.map(name => ({
                    id: `std-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    name: name.trim(),
                    traits: [],
                    customTraits: [], // Fixed: Always initialized as empty array
                    tone: 'gentle',
                    teacherNote: '',
                    comment: '',
                    history: [],
                    status: 'pending'
                }));
                
                setStudents(prev => [...prev, ...newStudents]);
                setBatchText('');
                if (!selectedId) setSelectedId(newStudents[0].id);
            };

            const updateStudent = (id, updates) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
            };

            const toggleTrait = (trait) => {
                if (!selectedStudent) return;
                const traits = selectedStudent.traits.includes(trait)
                    ? selectedStudent.traits.filter(t => t !== trait)
                    : [...selectedStudent.traits, trait];
                updateStudent(selectedId, { traits });
            };

            const handleAddCustomTag = (e) => {
                if (e.key === 'Enter' && customTagInput.trim()) {
                    e.preventDefault();
                    if (!selectedStudent) return;
                    
                    const newTag = customTagInput.trim();
                    // 防呆：避免重複標籤
                    if (selectedStudent.customTraits.includes(newTag)) {
                        setCustomTagInput('');
                        return;
                    }

                    const customTraits = [...(selectedStudent.customTraits || []), newTag];
                    updateStudent(selectedId, { customTraits });
                    setCustomTagInput('');
                }
            };

            const handleRemoveCustomTag = (tagToRemove) => {
                if (!selectedStudent) return;
                // Fixed: Explicitly filter by value and ensure we handle the state correctly
                const customTraits = selectedStudent.customTraits.filter(t => t !== tagToRemove);
                updateStudent(selectedId, { customTraits });
            };

            const generateComment = async (id, isRegenerate = false) => {
                const student = students.find(s => s.id === id);
                if (!student || !apiKey) {
                    alert('請先在設定中配置 API Key');
                    return;
                }

                updateStudent(id, { status: 'generating' });
                if (!isRegenerate) setIsGenerating(true);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                    const allTraits = [...(student.traits || []), ...(student.customTraits || [])].join('、');
                    const toneDesc = TONES.find(t => t.id === student.tone).prompt;
                    const lengthVal = LENGTHS.find(l => l.id === globalLength).value;

                    const userPrompt = `
                        你是一位擁有20年經驗的台灣國小導師。請用繁體中文與台灣習慣教育用語（絕對避免中國用語，如「質量、屏幕、優化、水平、給力」等），撰寫溫暖且具建設性的期末評語。直接輸出評語內容，不需任何開場白。
                        
                        學生姓名：${student.name}
                        學生特質：${allTraits || '表現平穩，生活單純'}
                        語氣要求：${toneDesc}
                        字數限制：${lengthVal}
                        ${student.teacherNote ? `導師補充細節：${student.teacherNote}` : ''}
                        
                        請以此資訊為基礎，撰寫一份動人的評語。
                    `;

                    const result = await model.generateContent(userPrompt);
                    const response = await result.response;
                    const text = response.text().trim();

                    setStudents(prev => prev.map(s => {
                        if (s.id === id) {
                            const newHistory = s.comment ? [s.comment, ...s.history].slice(0, 5) : s.history;
                            return { 
                                ...s, 
                                comment: text, 
                                history: newHistory,
                                status: 'done' 
                            };
                        }
                        return s;
                    }));
                } catch (error) {
                    console.error('API Error:', error);
                    updateStudent(id, { status: 'error' });
                    alert('生成失敗，請檢查 API Key 是否正確或網路狀態。');
                } finally {
                    setIsGenerating(false);
                }
            };

            const rollback = (id) => {
                setStudents(prev => prev.map(s => {
                    if (s.id === id && s.history && s.history.length > 0) {
                        const [lastComment, ...remainingHistory] = s.history;
                        return { 
                            ...s, 
                            comment: lastComment, 
                            history: remainingHistory 
                        };
                    }
                    return s;
                }));
            };

            const copyAll = () => {
                const allComments = students
                    .filter(s => s.comment)
                    .map(s => `【${s.name}】\n${s.comment}`)
                    .join('\n\n' + '='.repeat(20) + '\n\n');
                
                if (!allComments) {
                    alert('尚未生成任何評語');
                    return;
                }
                
                navigator.clipboard.writeText(allComments);
                alert('已複製所有已生成的評語！');
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Header Section */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-morandi-dark">國小教師期末評語生成器</h1>
                            <p className="text-morandi-clay">專業批次管理與 AI 生成系統</p>
                        </div>
                        <div className="flex gap-3">
                            <button 
                                onClick={() => setShowSettings(true)}
                                className="px-4 py-2 bg-white border border-morandi-sage text-morandi-sage rounded-lg hover:bg-morandi-oat transition-all"
                            >
                                ⚙️ API 設定
                            </button>
                            <button 
                                onClick={copyAll}
                                className="px-4 py-2 bg-morandi-sage text-white rounded-lg hover:opacity-90 shadow-sm transition-all"
                            >
                                📋 匯出全部
                            </button>
                        </div>
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md animate-fade-in border border-morandi-oat">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2">系統設定</h2>
                                <div className="mb-6">
                                    <label className="block text-sm font-medium mb-2 text-morandi-dark">Google Gemini API Key</label>
                                    <input 
                                        type="password" 
                                        placeholder="請貼上您的 API Key (AIza...)"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        className="w-full px-4 py-3 border rounded-xl bg-morandi-bg focus:ring-2 focus:ring-morandi-sage outline-none transition-all"
                                    />
                                    <p className="text-xs text-morandi-clay mt-2">※ 金鑰將僅存於您的瀏覽器本地空間 (LocalStorage)。</p>
                                </div>
                                <div className="flex justify-end">
                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="px-6 py-2 bg-morandi-sage text-white rounded-xl hover:opacity-90 transition-all"
                                    >
                                        儲存設定
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar: Student Management */}
                        <div className="lg:col-span-4 flex flex-col gap-6">
                            {/* Batch Import Card */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold mb-3 flex items-center gap-2">📥 快速匯入名冊</h3>
                                <textarea 
                                    className="w-full h-32 p-4 border rounded-xl bg-morandi-bg focus:ring-2 focus:ring-morandi-sage outline-none text-sm resize-none transition-all"
                                    placeholder="請輸入學生姓名（多位請用換行或空格隔開）"
                                    value={batchText}
                                    onChange={(e) => setBatchText(e.target.value)}
                                />
                                <button 
                                    onClick={handleBatchImport}
                                    className="w-full mt-3 py-2 bg-morandi-blue text-white rounded-xl hover:bg-opacity-90 transition-all font-medium"
                                >
                                    建立學生列表
                                </button>
                            </div>

                            {/* List Card */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex-1 min-h-[400px]">
                                <h3 className="text-lg font-bold mb-4 flex justify-between items-center text-morandi-dark">
                                    <span>👥 學生清單 ({students.length})</span>
                                    {students.length > 0 && (
                                        <button onClick={() => setStudents([])} className="text-xs text-morandi-clay hover:text-red-400">清空列表</button>
                                    )}
                                </h3>
                                <div className="space-y-2 max-h-[500px] overflow-y-auto custom-scrollbar pr-2">
                                    {students.length === 0 ? (
                                        <div className="text-center py-20 text-morandi-clay opacity-50 italic">尚未匯入學生</div>
                                    ) : (
                                        students.map(s => (
                                            <div 
                                                key={s.id}
                                                onClick={() => setSelectedId(s.id)}
                                                className={`p-4 rounded-xl cursor-pointer transition-all border ${
                                                    selectedId === s.id 
                                                    ? 'bg-morandi-oat border-morandi-sage shadow-sm' 
                                                    : 'bg-white border-transparent hover:bg-morandi-bg'
                                                } flex justify-between items-center group`}
                                            >
                                                <div className="font-medium group-hover:translate-x-1 transition-transform">{s.name}</div>
                                                <div className="flex items-center gap-2">
                                                    {s.status === 'done' && <span className="w-2 h-2 rounded-full bg-green-500" title="已生成"></span>}
                                                    {s.status === 'generating' && <span className="w-2 h-2 rounded-full bg-blue-500 animate-ping"></span>}
                                                    {s.status === 'pending' && <span className="w-2 h-2 rounded-full bg-gray-300"></span>}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Main Content: Config & Editor */}
                        <div className="lg:col-span-8">
                            {selectedStudent ? (
                                <div className="space-y-6 animate-fade-in">
                                    {/* Main Configuration Card */}
                                    <div className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 border-b border-morandi-bg pb-6">
                                            <h2 className="text-2xl font-bold flex items-center gap-3">
                                                <span className="w-12 h-12 bg-morandi-sage text-white rounded-2xl flex items-center justify-center text-xl shadow-sm">{selectedStudent.name[0]}</span>
                                                {selectedStudent.name}
                                            </h2>
                                            <div className="flex items-center gap-3">
                                                <select 
                                                    className="bg-morandi-bg border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-morandi-sage"
                                                    value={globalLength}
                                                    onChange={(e) => setGlobalLength(e.target.value)}
                                                >
                                                    {LENGTHS.map(l => <option key={l.id} value={l.id}>長度：{l.label}</option>)}
                                                </select>
                                                <select 
                                                    className="bg-morandi-bg border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-morandi-sage"
                                                    value={selectedStudent.tone}
                                                    onChange={(e) => updateStudent(selectedId, { tone: e.target.value })}
                                                >
                                                    {TONES.map(t => <option key={t.id} value={t.id}>語氣：{t.label}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        {/* Multidimensional Tags */}
                                        <div className="space-y-8">
                                            {TRAIT_CATEGORIES.map(cat => (
                                                <div key={cat.id}>
                                                    <h4 className="text-sm font-bold text-morandi-clay mb-4 tracking-wider">{cat.title}</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {cat.traits.map(trait => (
                                                            <button 
                                                                key={trait}
                                                                onClick={() => toggleTrait(trait)}
                                                                className={`px-4 py-1.5 rounded-full border text-sm transition-all ${
                                                                    selectedStudent.traits.includes(trait)
                                                                    ? 'chip-active scale-105 shadow-md'
                                                                    : 'bg-morandi-bg border-transparent hover:border-morandi-sage'
                                                                }`}
                                                            >
                                                                {trait}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {/* Custom Tags Section */}
                                            <div className="pt-4">
                                                <h4 className="text-sm font-bold text-morandi-clay mb-4 tracking-wider">🏷️ 自訂個別標籤</h4>
                                                <div className="flex flex-wrap gap-2">
                                                    {/* Fixed: Conditional rendering to ensure no undefined/empty tags */}
                                                    {selectedStudent.customTraits && selectedStudent.customTraits.length > 0 && selectedStudent.customTraits.map((trait, idx) => (
                                                        <div 
                                                            key={`${trait}-${idx}`}
                                                            className="chip-custom px-4 py-1.5 rounded-full border text-sm flex items-center gap-2 animate-fade-in shadow-sm"
                                                        >
                                                            {trait}
                                                            <button 
                                                                onClick={(e) => {
                                                                    e.stopPropagation();
                                                                    handleRemoveCustomTag(trait);
                                                                }}
                                                                className="hover:text-red-200 font-bold leading-none"
                                                            >
                                                                ×
                                                            </button>
                                                        </div>
                                                    ))}
                                                    <input 
                                                        type="text"
                                                        placeholder="+ 輸入並按 Enter"
                                                        value={customTagInput}
                                                        onChange={(e) => setCustomTagInput(e.target.value)}
                                                        onKeyDown={handleAddCustomTag}
                                                        className="px-4 py-1.5 rounded-full bg-transparent border border-dashed border-morandi-sage text-sm focus:outline-none focus:border-solid w-40 transition-all"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        {/* Teacher's Note Section */}
                                        <div className="mt-10 border-t border-morandi-bg pt-8">
                                            <h4 className="text-sm font-bold text-morandi-clay mb-4 flex items-center gap-2">📝 導師補充備忘 (具體事蹟)</h4>
                                            <textarea 
                                                className="w-full h-28 p-4 border rounded-2xl bg-morandi-bg focus:ring-2 focus:ring-morandi-sage outline-none text-sm resize-none transition-all"
                                                placeholder="請輸入該學生的具體表現，例如：數學進步顯著、參與運動會獲得佳績、擔任衛生股長認真負責..."
                                                value={selectedStudent.teacherNote}
                                                onChange={(e) => updateStudent(selectedId, { teacherNote: e.target.value })}
                                            />
                                        </div>

                                        <button 
                                            onClick={() => generateComment(selectedId)}
                                            disabled={isGenerating || !apiKey}
                                            className={`w-full mt-8 py-4 rounded-2xl font-bold text-xl transition-all shadow-lg flex items-center justify-center gap-3 ${
                                                isGenerating 
                                                ? 'bg-morandi-clay cursor-not-allowed text-white' 
                                                : 'bg-morandi-sage text-white hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0'
                                            }`}
                                        >
                                            {isGenerating ? (
                                                <>
                                                    <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                                    老師辛苦了，評語撰寫中...
                                                </>
                                            ) : '✨ 生成專業期末評語'}
                                        </button>
                                    </div>

                                    {/* AI Output Section */}
                                    {(selectedStudent.comment || selectedStudent.status === 'generating') && (
                                        <div className="bg-white rounded-2xl p-8 shadow-sm border border-morandi-oat animate-fade-in relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-1 h-full bg-morandi-sage"></div>
                                            <div className="flex justify-between items-center mb-6">
                                                <h3 className="font-bold text-xl text-morandi-dark">評語生成結果</h3>
                                                <div className="flex gap-2">
                                                    {selectedStudent.history && selectedStudent.history.length > 0 && (
                                                        <button 
                                                            onClick={() => rollback(selectedId)}
                                                            className="px-4 py-1.5 text-xs border border-morandi-clay text-morandi-clay rounded-xl hover:bg-morandi-bg transition-all"
                                                            title="復原回上一次生成的內容"
                                                        >
                                                            🔙 返回上一次
                                                        </button>
                                                    )}
                                                    <button 
                                                        onClick={() => generateComment(selectedId, true)}
                                                        className="px-4 py-1.5 text-xs bg-morandi-oat text-morandi-dark rounded-xl hover:bg-morandi-sage hover:text-white transition-all shadow-sm"
                                                    >
                                                        🔄 重新生成
                                                    </button>
                                                </div>
                                            </div>

                                            {selectedStudent.status === 'generating' ? (
                                                <div className="py-16 text-center space-y-4">
                                                    <div className="inline-block w-8 h-8 border-4 border-morandi-oat border-t-morandi-sage rounded-full animate-spin"></div>
                                                    <p className="text-morandi-clay animate-pulse">正在為學生的表現細心措辭中...</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-6">
                                                    <div className="bg-morandi-bg p-8 rounded-2xl text-morandi-dark leading-relaxed whitespace-pre-wrap text-lg relative group">
                                                        {selectedStudent.comment}
                                                        <button 
                                                            onClick={() => {
                                                                navigator.clipboard.writeText(selectedStudent.comment);
                                                                alert('已複製到剪貼簿');
                                                            }}
                                                            className="absolute bottom-4 right-4 bg-white/80 p-2 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity shadow-sm"
                                                            title="點擊複製"
                                                        >
                                                            📋
                                                        </button>
                                                    </div>
                                                    <p className="text-xs text-morandi-clay text-right italic">※ AI 生成內容僅供參考，請老師根據實際情況進行最終修訂。</p>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-morandi-clay opacity-50 py-32 bg-white/40 rounded-3xl border-2 border-dashed border-morandi-sage">
                                    <div className="text-8xl mb-6">🖋️</div>
                                    <h2 className="text-2xl font-bold mb-2">準備好撰寫評語了嗎？</h2>
                                    <p>請先從左側選擇學生或批次匯入名冊</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
