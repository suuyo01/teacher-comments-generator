<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>評什麼東西 | 台灣國小期末評語生成器 (Firebase 穩定版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            sage: '#8E9775',
                            oat: '#EFE9E1',
                            blue: '#95ADBE',
                            rose: '#D4A5A5',
                            clay: '#B08E8E',
                            bg: '#F8F6F2',
                            dark: '#4A5568',
                            custom: '#A3B18A'
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F6F2; color: #4A5568; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .chip-active { background-color: #8E9775 !important; color: white !important; border-color: #8E9775 !important; }
        .chip-custom { background-color: #95ADBE !important; color: white !important; border-color: #95ADBE !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col">
    <div id="root" class="flex-grow"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenerativeAI } from '@google/generative-ai';

        const MODEL_NAME = "gemini-2.5-flash";

        const TRAIT_CATEGORIES = [
            { id: 'attitude', title: '學習態度', traits: ['積極主動', '專注認真', '思維敏捷', '思慮周祥', '被動謹慎', '需多叮嚀', '求知慾強', '樂於發表', '耐心不足', '作業工整'] },
            { id: 'interpersonal', title: '人際與社交', traits: ['溫和友善', '熱心助人', '領導力強', '樂於分享', '害羞內向', '活潑開朗', '合群守法', '善於溝通', '耿直大方', '謙恭有禮'] },
            { id: 'character', title: '常規與品格', traits: ['誠實負責', '遵守紀律', '愛惜公公物', '沉穩內斂', '粗心大意', '情緒穩定', '尊師重道', '言行一致', '熱心公務', '有禮貌'] },
            { id: 'special', title: '特殊表現', traits: ['具藝術天分', '體育表現傑出', '口才流利', '喜愛閱讀', '動手能力強', '音感極佳', '邏輯力強', '擅長科技', '服務熱忱', '創意無限'] }
        ];

        const TONES = [
            { id: 'gentle', label: '溫柔鼓勵', prompt: '溫柔、充滿鼓勵與包容，多發掘孩子的亮點' },
            { id: 'expectant', label: '殷切期盼', prompt: '殷切期盼、具備指引性，溫和地指出可進步的空間並給予方法' },
            { id: 'objective', label: '客觀中肯', prompt: '客觀、中肯、平實地描述學生的具體表現' },
            { id: 'praise', label: '讚賞肯定', prompt: '充滿讚賞與肯定，高度肯定其卓越表現與榜樣作用' },
            { id: 'humorous', label: '幽默風趣', prompt: '語氣輕鬆、幽默風趣，展現親和力與對孩子天性的理解' }
        ];

        const LENGTHS = [
            { id: 'short', label: '50字', value: '50字以內' },
            { id: 'medium', label: '100字', value: '100字左右' },
            { id: 'long', label: '150字', value: '150字以上' }
        ];

        function App() {
            // Global Settings
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [globalLength, setGlobalLength] = useState('medium');
            const [apiStatus, setApiStatus] = useState({ type: 'idle', message: '' });
            
            // Core State
            const [students, setStudents] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            
            // UI State
            const [batchText, setBatchText] = useState('');
            const [customTagInput, setCustomTagInput] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [viewCount, setViewCount] = useState('讀取中...');

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            // Firebase Hit Counter Logic
            useEffect(() => {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp({ 
                            databaseURL: 'https://teacher-comments-counter-default-rtdb.firebaseio.com/' 
                        });
                    }
                    const db = firebase.database();
                    const counterRef = db.ref('visitchat/suuyo01_v2'); // 使用 v2 標籤區分新版
                    
                    counterRef.transaction(current => (current || 0) + 1, (error, committed, snapshot) => {
                        if (error) {
                            console.error('Counter Error:', error);
                            setViewCount('--');
                        } else if (snapshot) {
                            setViewCount(snapshot.val());
                        }
                    });
                } catch (e) {
                    console.error('Firebase Init Error:', e);
                    setViewCount('--');
                }
            }, []);

            const selectedStudent = useMemo(() => 
                students.find(s => s.id === selectedId) || null, 
            [students, selectedId]);

            const translateError = (error) => {
                const status = error.status || (error.response && error.response.status);
                const code = error.code || (error.response && error.response.data && error.response.data.error && error.response.data.error.code);
                if (status === 400 || code === 400) return "❌ 錯誤 400：請求格式錯誤或模型名稱設定不正確。";
                if (status === 404 || code === 404) return `❌ 錯誤 404：找不到模型 ${MODEL_NAME}。`;
                if (status === 403 || code === 403) return "❌ 錯誤 403：權限遭拒。請確認 API Key 是否有效。";
                if (status === 429 || code === 429) return "❌ 錯誤 429：觸發頻率限制。請稍候 1 分鐘。";
                return `❌ 連線發生錯誤：${error.message || '請檢查網路連線'}`;
            };

            const testConnection = async () => {
                if (!apiKey) {
                    setApiStatus({ type: 'error', message: '請先輸入 API Key' });
                    return;
                }
                setApiStatus({ type: 'testing', message: '⚡ 正在連線測試中...' });
                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: MODEL_NAME });
                    const result = await model.generateContent("Say 'Ready'");
                    const response = await result.response;
                    if (response.text()) setApiStatus({ type: 'success', message: `✅ 連線成功！模型 ${MODEL_NAME} 已就緒。` });
                } catch (error) {
                    setApiStatus({ type: 'error', message: translateError(error) });
                }
            };

            const handleBatchImport = () => {
                const names = batchText.split(/[\n\s,]+/).filter(n => n.trim());
                if (names.length === 0) return;
                const newStudents = names.map(name => ({
                    id: `std-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                    name: name.trim(),
                    traits: [],
                    customTraits: [],
                    tone: 'gentle',
                    teacherNote: '',
                    comment: '',
                    history: [],
                    status: 'pending',
                    errorMsg: ''
                }));
                setStudents(prev => [...prev, ...newStudents]);
                setBatchText('');
                if (!selectedId) setSelectedId(newStudents[0].id);
            };

            const handleDeleteStudent = (e, targetId) => {
                e.stopPropagation();
                setStudents(prev => {
                    const filtered = prev.filter(s => s.id !== targetId);
                    if (selectedId === targetId) setSelectedId(filtered.length > 0 ? filtered[0].id : null);
                    return filtered;
                });
            };

            const updateStudent = (id, updates) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
            };

            const toggleTrait = (trait) => {
                if (!selectedStudent) return;
                const traits = selectedStudent.traits.includes(trait)
                    ? selectedStudent.traits.filter(t => t !== trait)
                    : [...selectedStudent.traits, trait];
                updateStudent(selectedId, { traits });
            };

            const handleAddCustomTag = (e) => {
                if (e.key === 'Enter' && customTagInput.trim()) {
                    e.preventDefault();
                    if (!selectedStudent) return;
                    const newTag = customTagInput.trim();
                    if (selectedStudent.customTraits.includes(newTag)) {
                        setCustomTagInput('');
                        return;
                    }
                    const customTraits = [...(selectedStudent.customTraits || []), newTag];
                    updateStudent(selectedId, { customTraits });
                    setCustomTagInput('');
                }
            };

            const handleRemoveCustomTag = (tagToRemove) => {
                if (!selectedStudent) return;
                const customTraits = selectedStudent.customTraits.filter(t => t !== tagToRemove);
                updateStudent(selectedId, { customTraits });
            };

            const generateComment = async (id, isRegenerate = false) => {
                const student = students.find(s => s.id === id);
                if (!student || !apiKey) {
                    setShowSettings(true);
                    return;
                }
                updateStudent(id, { status: 'generating', errorMsg: '' });
                if (!isRegenerate) setIsGenerating(true);
                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: MODEL_NAME });
                    const allTraits = [...(student.traits || []), ...(student.customTraits || [])].join('、');
                    const toneDesc = TONES.find(t => t.id === student.tone).prompt;
                    const lengthVal = LENGTHS.find(l => l.id === globalLength).value;
                    const userPrompt = `你是一位擁有20年經驗的台灣國小導師。請用繁體中文與台灣習慣教育用語（避免中國用語），撰寫溫暖且具建設性的期末評語。直接輸出內容。
                    學生姓名：${student.name}
                    學生特質：${allTraits || '表現平穩'}
                    語氣：${toneDesc}
                    字數：${lengthVal}
                    ${student.teacherNote ? `備註：${student.teacherNote}` : ''}`;
                    const result = await model.generateContent(userPrompt);
                    const response = await result.response;
                    const text = response.text().trim();
                    setStudents(prev => prev.map(s => {
                        if (s.id === id) {
                            const newHistory = s.comment ? [s.comment, ...s.history].slice(0, 5) : s.history;
                            return { ...s, comment: text, history: newHistory, status: 'done' };
                        }
                        return s;
                    }));
                } catch (error) {
                    updateStudent(id, { status: 'error', errorMsg: translateError(error) });
                } finally {
                    setIsGenerating(false);
                }
            };

            const generateAll = async () => {
                const pending = students.filter(s => s.status !== 'done');
                if (pending.length === 0) return;
                setIsGenerating(true);
                for (let i = 0; i < pending.length; i++) {
                    await generateComment(pending[i].id);
                    if (i < pending.length - 1) await new Promise(r => setTimeout(r, 2000));
                }
                setIsGenerating(false);
            };

            const rollback = (id) => {
                setStudents(prev => prev.map(s => {
                    if (s.id === id && s.history && s.history.length > 0) {
                        const [last, ...rem] = s.history;
                        return { ...s, comment: last, history: rem };
                    }
                    return s;
                }));
            };

            const copyAll = () => {
                const all = students.filter(s => s.comment).map(s => `【${s.name}】\n${s.comment}`).join('\n\n---\n\n');
                if (!all) return alert('尚未生成評語');
                navigator.clipboard.writeText(all);
                alert('已複製所有評語！');
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <div>
                            <h1 className="text-4xl font-black text-morandi-dark tracking-tighter">評什麼東西</h1>
                            <p className="text-morandi-clay font-bold mt-1 tracking-wide">台灣國小期末評語生成器 (Gemini 2.5 專業版)</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setShowSettings(true)} className="px-5 py-2.5 bg-white border border-morandi-sage text-morandi-sage rounded-xl hover:bg-morandi-oat transition-all shadow-sm font-medium">⚙️ API 連線設定</button>
                            <button onClick={copyAll} className="px-5 py-2.5 bg-morandi-sage text-white rounded-xl hover:opacity-90 shadow-md transition-all font-medium">📋 複製所有評語</button>
                        </div>
                    </div>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2rem] shadow-2xl p-8 w-full max-w-xl animate-fade-in border border-morandi-oat">
                                <h2 className="text-2xl font-bold mb-6 text-morandi-dark">系統連線設定</h2>
                                <div className="space-y-4">
                                    <div className="flex gap-2">
                                        <input type="password" placeholder="請輸入 API Key" value={apiKey} onChange={(e) => { setApiKey(e.target.value); setApiStatus({ type: 'idle', message: '' }); }} className="flex-1 px-4 py-3 border-2 border-morandi-bg rounded-2xl outline-none focus:border-morandi-sage" />
                                        <button onClick={testConnection} disabled={apiStatus.type === 'testing'} className="px-6 py-2 bg-morandi-blue text-white rounded-2xl hover:bg-opacity-90 font-medium disabled:opacity-50">⚡ 測試連線</button>
                                    </div>
                                    {apiStatus.message && <div className={`p-4 rounded-xl text-sm font-medium ${apiStatus.type === 'success' ? 'bg-green-50 text-green-700' : 'bg-red-50 text-red-700'}`}>{apiStatus.message}</div>}
                                    <div className="text-[10px] text-gray-400 italic">🔒 本工具為純前端架構，您的 API Key 與學生資安資料皆儲存於您個人的瀏覽器本地端（LocalStorage），本站絕不收集或上傳任何隱私資訊，請安心使用。</div>
                                </div>
                                <div className="flex justify-end mt-8"><button onClick={() => setShowSettings(false)} className="px-10 py-3 bg-morandi-dark text-white rounded-2xl font-bold shadow-lg hover:opacity-90">儲存並關閉</button></div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Sidebar */}
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold mb-4 text-morandi-dark font-black">📥 批次匯入學生姓名</h3>
                                <textarea className="w-full h-32 p-4 border-2 border-morandi-bg rounded-2xl outline-none focus:border-morandi-sage resize-none text-sm" placeholder="貼上姓名，每行一個..." value={batchText} onChange={(e) => setBatchText(e.target.value)} />
                                <button onClick={handleBatchImport} className="w-full mt-4 py-3 bg-morandi-blue text-white rounded-2xl font-bold hover:bg-opacity-90 transition-all shadow-sm">匯入名單</button>
                            </div>
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-gray-100 flex-1 min-h-[450px]">
                                <h3 className="text-lg font-bold mb-5 flex justify-between items-center text-morandi-dark font-black"><span>👥 名冊管理 ({students.length})</span>{students.length > 0 && <button onClick={() => confirm('確定清空？') && setStudents([])} className="text-xs text-red-400 font-bold hover:underline">清空列表</button>}</h3>
                                <div className="space-y-2 max-h-[400px] overflow-y-auto custom-scrollbar pr-1">
                                    {students.length === 0 ? <div className="text-center py-20 text-morandi-clay opacity-40 italic font-medium">尚未匯入學生</div> : students.map(s => (
                                        <div key={s.id} onClick={() => setSelectedId(s.id)} className={`p-4 rounded-2xl cursor-pointer transition-all border-2 flex justify-between items-center group ${selectedId === s.id ? 'bg-morandi-oat border-morandi-sage shadow-sm' : 'bg-white border-transparent hover:bg-morandi-bg'}`}>
                                            <div className="flex items-center gap-3"><span className={`w-2 h-2 rounded-full ${s.status === 'done' ? 'bg-green-500' : s.status === 'generating' ? 'bg-blue-500 animate-ping' : s.status === 'error' ? 'bg-red-500' : 'bg-gray-300'}`}></span><div className="font-bold text-morandi-dark">{s.name}</div></div>
                                            <button onClick={(e) => handleDeleteStudent(e, s.id)} className="opacity-0 group-hover:opacity-100 p-2 text-red-300 hover:text-red-500 transition-colors">🗑️</button>
                                        </div>
                                    ))}
                                </div>
                                {students.length > 0 && <button onClick={generateAll} disabled={isGenerating} className="w-full mt-6 py-3 bg-morandi-sage text-white rounded-2xl font-black shadow-md disabled:opacity-50 hover:opacity-90 transition-all">批次自動生成</button>}
                            </div>
                        </div>

                        {/* Editor Area */}
                        <div className="lg:col-span-8">
                            {selectedStudent ? (
                                <div className="space-y-6 animate-fade-in">
                                    <div className="bg-white rounded-[2rem] p-8 shadow-sm border border-gray-100">
                                        <div className="flex flex-col sm:flex-row justify-between items-center mb-8 border-b border-morandi-bg pb-8">
                                            <div className="flex items-center gap-5">
                                                <div className="w-14 h-14 bg-morandi-sage text-white rounded-[1.2rem] flex items-center justify-center text-2xl font-black shadow-inner">{selectedStudent.name[0]}</div>
                                                <h2 className="text-2xl font-black text-morandi-dark">{selectedStudent.name}</h2>
                                            </div>
                                            <div className="flex gap-3">
                                                <select className="bg-morandi-bg border-none rounded-xl px-4 py-2 text-sm font-bold shadow-sm" value={globalLength} onChange={(e) => setGlobalLength(e.target.value)}>{LENGTHS.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}</select>
                                                <select className="bg-morandi-bg border-none rounded-xl px-4 py-2 text-sm font-bold shadow-sm" value={selectedStudent.tone} onChange={(e) => updateStudent(selectedId, { tone: e.target.value })}>{TONES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}</select>
                                            </div>
                                        </div>
                                        <div className="space-y-10">
                                            {TRAIT_CATEGORIES.map(cat => (
                                                <div key={cat.id}>
                                                    <h4 className="text-[10px] font-black text-morandi-clay mb-4 tracking-widest uppercase flex items-center gap-2 font-black"><span className="w-1.5 h-1.5 rounded-full bg-morandi-blue"></span>{cat.title}</h4>
                                                    <div className="flex flex-wrap gap-2.5">
                                                        {cat.traits.map(trait => (
                                                            <button key={trait} onClick={() => toggleTrait(trait)} className={`px-5 py-2 rounded-2xl border-2 text-sm font-bold transition-all ${selectedStudent.traits.includes(trait) ? 'chip-active scale-105 shadow-md border-morandi-sage' : 'bg-morandi-bg border-transparent hover:border-morandi-oat'}`}>{trait}</button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            <div>
                                                <h4 className="text-[10px] font-black text-morandi-clay mb-4 tracking-widest uppercase flex items-center gap-2 font-black"><span className="w-1.5 h-1.5 rounded-full bg-morandi-rose"></span>自訂個別標籤</h4>
                                                <div className="flex flex-wrap gap-2.5">
                                                    {selectedStudent.customTraits.map((trait, idx) => (
                                                        <div key={`${trait}-${idx}`} className="chip-custom px-5 py-2 rounded-2xl border-2 border-morandi-blue text-sm font-bold flex items-center gap-2 shadow-sm animate-fade-in font-black">{trait}<button onClick={(e) => { e.stopPropagation(); handleRemoveCustomTag(trait); }}>✕</button></div>
                                                    ))}
                                                    <input type="text" placeholder="+ 輸入並按 Enter" value={customTagInput} onChange={(e) => setCustomTagInput(e.target.value)} onKeyDown={handleAddCustomTag} className="px-5 py-2 rounded-2xl bg-transparent border-2 border-dashed border-morandi-clay/40 text-sm outline-none focus:border-solid focus:border-morandi-sage w-48 font-bold" />
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mt-12 pt-10 border-t border-morandi-bg">
                                            <h4 className="text-sm font-bold text-morandi-dark mb-4 font-black">📝 導師補充建議與具體事蹟</h4>
                                            <textarea className="w-full h-32 p-5 border-2 border-morandi-bg rounded-3xl outline-none focus:border-morandi-sage text-sm resize-none font-medium leading-relaxed" placeholder="描述具體表現以產出更真實的評語..." value={selectedStudent.teacherNote} onChange={(e) => updateStudent(selectedId, { teacherNote: e.target.value })} />
                                        </div>
                                        <button onClick={() => generateComment(selectedId)} disabled={isGenerating} className={`w-full mt-10 py-5 rounded-3xl font-black text-xl transition-all shadow-xl ${isGenerating ? 'bg-morandi-clay cursor-wait text-white scale-[0.98]' : 'bg-morandi-sage text-white hover:shadow-2xl active:scale-95'}`}>{isGenerating ? '正在撰寫...' : '✨ 生成評語'}</button>
                                    </div>
                                    {(selectedStudent.comment || selectedStudent.status === 'generating' || selectedStudent.status === 'error') && (
                                        <div className="bg-white rounded-[2rem] p-10 shadow-sm border border-morandi-oat relative overflow-hidden animate-fade-in">
                                            <div className={`absolute top-0 left-0 w-2.5 h-full ${selectedStudent.status === 'error' ? 'bg-red-400' : 'bg-morandi-sage'}`}></div>
                                            <div className="flex justify-between items-center mb-8">
                                                <h3 className="font-black text-2xl text-morandi-dark">評語生成成果</h3>
                                                <div className="flex gap-2">
                                                    {selectedStudent.history.length > 0 && <button onClick={() => rollback(selectedId)} className="px-5 py-2 text-xs border-2 border-morandi-clay text-morandi-clay rounded-2xl font-bold transition-all">🔙 復原</button>}
                                                    <button onClick={() => generateComment(selectedId, true)} className="px-5 py-2 text-xs bg-morandi-oat text-morandi-dark rounded-2xl font-bold shadow-sm hover:bg-morandi-sage hover:text-white transition-all">🔄 重新生成</button>
                                                </div>
                                            </div>
                                            {selectedStudent.status === 'generating' ? <div className="py-20 text-center space-y-4"><div className="w-12 h-12 border-4 border-morandi-bg border-t-morandi-sage rounded-full animate-spin mx-auto"></div><p className="text-morandi-clay font-bold animate-pulse font-black text-lg">評語醞釀中...</p></div> : selectedStudent.status === 'error' ? <div className="p-8 bg-red-50 text-red-700 font-bold rounded-3xl shadow-inner">{selectedStudent.errorMsg}</div> : <div className="space-y-6"><div className="bg-morandi-bg p-10 rounded-[2rem] text-morandi-dark leading-[1.9] whitespace-pre-wrap text-xl font-bold relative group border-2 border-morandi-oat/50 shadow-sm">{selectedStudent.comment}<button onClick={() => { navigator.clipboard.writeText(selectedStudent.comment); alert('已複製'); }} className="absolute bottom-6 right-6 bg-white p-4 rounded-2xl shadow-xl opacity-0 group-hover:opacity-100 transition-all hover:scale-110 border border-morandi-bg">📋 複製文字</button></div></div>}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center py-48 bg-white/40 rounded-[3rem] border-4 border-dashed border-morandi-sage/30">
                                    <div className="text-9xl mb-10 opacity-60 drop-shadow-sm">🖊️</div>
                                    <h2 className="text-3xl font-black text-morandi-dark mb-4">歡迎使用評語系統</h2>
                                    <p className="text-morandi-clay font-bold text-lg">請選擇學生以開始工作</p>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Footer with Firebase Pure Text Counter */}
                    <footer className="mt-20 py-12 border-t border-morandi-bg text-center space-y-4">
                        <div className="flex items-center justify-center gap-2">
                            <span className="text-xs text-gray-400 opacity-50 font-bold tracking-tight">
                                👁️ 總瀏覽人次：{viewCount} 次
                            </span>
                        </div>
                        <div className="text-sm text-gray-500 font-black tracking-widest">© 2026 導師已登出開發團隊. All Rights Reserved.</div>
                        <div className="max-w-2xl mx-auto px-4">
                            <span className="text-xs text-gray-400 opacity-50 block mt-1 leading-relaxed">
                                ⚖️ 著作權與智慧財產權宣告：本工具開放大眾教學無償使用，惟程式碼資產、視覺商標及智慧財產權均屬「導師已登出開發團隊」所有，未經授權禁止商業拷貝或再包裝銷售。本工具生成之評語僅供教學參考，最終採用權與審查權仍歸各校經辦教師所有。
                            </span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
