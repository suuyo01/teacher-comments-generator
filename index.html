<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣國小期末評語生成器 (專業重構版) | Gemini 2.5 Flash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            sage: '#8E9775',
                            oat: '#EFE9E1',
                            blue: '#95ADBE',
                            rose: '#D4A5A5',
                            clay: '#B08E8E',
                            bg: '#F8F6F2',
                            dark: '#4A5568',
                            custom: '#A3B18A'
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #F8F6F2; color: #4A5568; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .chip-active { background-color: #8E9775 !important; color: white !important; border-color: #8E9775 !important; }
        .chip-custom { background-color: #95ADBE !important; color: white !important; border-color: #95ADBE !important; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen font-sans">
    <div id="root"></div>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "@google/generative-ai": "https://esm.sh/@google/generative-ai"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { GoogleGenerativeAI } from '@google/generative-ai';

        // Constants
        const TRAIT_CATEGORIES = [
            { 
                id: 'attitude',
                title: '學習態度', 
                traits: ['積極主動', '專注認真', '思維敏捷', '思慮周祥', '被動謹慎', '需多叮嚀', '求知慾強', '樂於發表', '耐心不足', '作業工整'] 
            },
            { 
                id: 'interpersonal',
                title: '人際與社交', 
                traits: ['溫和友善', '熱心助人', '領導力強', '樂於分享', '害羞內向', '活潑開朗', '合群守法', '善於溝通', '耿直大方', '謙恭有禮'] 
            },
            { 
                id: 'character',
                title: '常規與品格', 
                traits: ['誠實負責', '遵守紀律', '愛惜公物', '沉穩內斂', '粗心大意', '情緒穩定', '尊師重道', '言行一致', '熱心公務', '有禮貌'] 
            },
            { 
                id: 'special',
                title: '特殊表現', 
                traits: ['具藝術天分', '體育表現傑出', '口才流利', '喜愛閱讀', '動手能力強', '音感極佳', '邏輯力強', '擅長數位', '服務熱忱', '創意無限'] 
            }
        ];

        const TONES = [
            { id: 'gentle', label: '溫柔鼓勵', prompt: '溫柔、充滿鼓勵與包容，多發掘孩子的亮點' },
            { id: 'expectant', label: '殷切期盼', prompt: '殷切期盼、具備指引性，溫和地指出可進步的空間並給予方法' },
            { id: 'objective', label: '客觀中肯', prompt: '客觀、中肯、平實地描述學生的具體表現' },
            { id: 'praise', label: '讚賞肯定', prompt: '充滿讚賞與肯定，高度肯定其卓越表現與榜樣作用' },
            { id: 'humorous', label: '幽默風趣', prompt: '語氣輕鬆、幽默風趣，展現親和力與對孩子天性的理解' }
        ];

        const LENGTHS = [
            { id: 'short', label: '50字', value: '50字以內' },
            { id: 'medium', label: '100字', value: '100字左右' },
            { id: 'long', label: '150字', value: '150字以上' }
        ];

        function App() {
            // Global Settings
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [globalLength, setGlobalLength] = useState('medium');
            
            // Core State: List of students with all their attributes
            const [students, setStudents] = useState([]);
            const [selectedId, setSelectedId] = useState(null);
            
            // UI State
            const [batchText, setBatchText] = useState('');
            const [customTagInput, setCustomTagInput] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey);
            }, [apiKey]);

            const selectedStudent = useMemo(() => 
                students.find(s => s.id === selectedId), 
            [students, selectedId]);

            // Handlers
            const handleBatchImport = () => {
                const names = batchText.split(/[\n\s,]+/).filter(n => n.trim());
                if (names.length === 0) return;
                
                const newStudents = names.map(name => ({
                    id: Date.now() + Math.random(),
                    name,
                    traits: [],
                    customTraits: [],
                    tone: 'gentle',
                    teacherNote: '',
                    comment: '',
                    history: [], // For rollback
                    status: 'pending' // pending, generating, done, error
                }));
                
                setStudents(prev => [...prev, ...newStudents]);
                setBatchText('');
                if (!selectedId) setSelectedId(newStudents[0].id);
            };

            const updateStudent = (id, updates) => {
                setStudents(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
            };

            const toggleTrait = (trait) => {
                if (!selectedStudent) return;
                const traits = selectedStudent.traits.includes(trait)
                    ? selectedStudent.traits.filter(t => t !== trait)
                    : [...selectedStudent.traits, trait];
                updateStudent(selectedId, { traits });
            };

            const addCustomTag = (e) => {
                if (e.key === 'Enter' && customTagInput.trim()) {
                    if (!selectedStudent) return;
                    const customTraits = [...selectedStudent.customTraits, customTagInput.trim()];
                    updateStudent(selectedId, { customTraits });
                    setCustomTagInput('');
                }
            };

            const removeCustomTag = (tag) => {
                const customTraits = selectedStudent.customTraits.filter(t => t !== tag);
                updateStudent(selectedId, { customTraits });
            };

            const generateComment = async (id, isRegenerate = false) => {
                const student = students.find(s => s.id === id);
                if (!student || !apiKey) {
                    alert('請先設定 API Key');
                    return;
                }

                updateStudent(id, { status: 'generating' });
                if (!isRegenerate) setIsGenerating(true);

                try {
                    const genAI = new GoogleGenerativeAI(apiKey);
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

                    const allTraits = [...student.traits, ...student.customTraits].join('、');
                    const toneDesc = TONES.find(t => t.id === student.tone).prompt;
                    const lengthVal = LENGTHS.find(l => l.id === globalLength).value;

                    const systemPrompt = `你是一位擁有20年經驗的台灣國小導師。請用繁體中文與台灣習慣教育用語（絕對避免中國用語，如「質量、屏幕、優化」等，應使用「品質、螢幕、最佳化」），撰寫溫暖且具建設性的期末評語。直接輸出評語內容，不需任何開場白。`;
                    
                    const userPrompt = `
                        學生姓名：${student.name}
                        學生特質：${allTraits || '表現平穩'}
                        語氣要求：${toneDesc}
                        字數限制：${lengthVal}
                        ${student.teacherNote ? `導師特別備註：${student.teacherNote}` : ''}
                        
                        請以此資訊為基礎，為該學生撰寫一份動人的期末評語。
                    `;

                    const result = await model.generateContent(userPrompt);
                    const response = await result.response;
                    const text = response.text();

                    setStudents(prev => prev.map(s => {
                        if (s.id === id) {
                            const newHistory = s.comment ? [s.comment, ...s.history].slice(0, 5) : s.history;
                            return { 
                                ...s, 
                                comment: text.trim(), 
                                history: newHistory,
                                status: 'done' 
                            };
                        }
                        return s;
                    }));
                } catch (error) {
                    console.error(error);
                    updateStudent(id, { status: 'error' });
                    alert('生成失敗，請檢查 API Key 或網路連線');
                } finally {
                    setIsGenerating(false);
                }
            };

            const rollback = (id) => {
                setStudents(prev => prev.map(s => {
                    if (s.id === id && s.history.length > 0) {
                        const [lastComment, ...remainingHistory] = s.history;
                        return { 
                            ...s, 
                            comment: lastComment, 
                            history: remainingHistory 
                        };
                    }
                    return s;
                }));
            };

            const copyAll = () => {
                const allComments = students
                    .filter(s => s.comment)
                    .map(s => `${s.name}：\n${s.comment}`)
                    .join('\n\n---\n\n');
                navigator.clipboard.writeText(allComments);
                alert('已複製所有評語！');
            };

            return (
                <div className="max-w-7xl mx-auto px-4 py-8">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-morandi-dark">國小教師期末評語生成器</h1>
                            <p className="text-morandi-clay">AI 驅動的專業評語批次管理系統</p>
                        </div>
                        <div className="flex gap-4">
                            <button 
                                onClick={() => setShowSettings(!showSettings)}
                                className="px-4 py-2 bg-white border border-morandi-sage text-morandi-sage rounded-lg hover:bg-morandi-oat transition-colors"
                            >
                                ⚙️ 設定 API Key
                            </button>
                            <button 
                                onClick={copyAll}
                                className="px-4 py-2 bg-morandi-sage text-white rounded-lg hover:opacity-90 transition-opacity shadow-sm"
                            >
                                📋 複製所有評語
                            </button>
                        </div>
                    </div>

                    {/* API Key Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md animate-fade-in">
                                <h2 className="text-xl font-bold mb-4">系統設定</h2>
                                <div className="mb-4">
                                    <label className="block text-sm font-medium mb-1">Gemini API Key</label>
                                    <input 
                                        type="password" 
                                        placeholder="輸入 AIza... 開頭的金鑰"
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        className="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-morandi-sage outline-none"
                                    />
                                    <p className="text-xs text-gray-500 mt-2">金鑰將安全地儲存於您的瀏覽器中。</p>
                                </div>
                                <div className="flex justify-end">
                                    <button 
                                        onClick={() => setShowSettings(false)}
                                        className="px-6 py-2 bg-morandi-sage text-white rounded-lg"
                                    >
                                        儲存並關閉
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Left Column: List */}
                        <div className="lg:col-span-4 flex flex-col gap-6">
                            {/* Batch Import */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold mb-3 flex items-center gap-2">
                                    <span>📥 批次匯入</span>
                                </h3>
                                <textarea 
                                    className="w-full h-32 p-3 border rounded-xl bg-morandi-bg focus:ring-2 focus:ring-morandi-sage outline-none text-sm resize-none"
                                    placeholder="貼上學生姓名，每行一個或是空格分隔..."
                                    value={batchText}
                                    onChange={(e) => setBatchText(e.target.value)}
                                />
                                <button 
                                    onClick={handleBatchImport}
                                    className="w-full mt-3 py-2 bg-morandi-blue text-white rounded-xl hover:opacity-90 transition-opacity"
                                >
                                    一鍵匯入名冊
                                </button>
                            </div>

                            {/* Student List */}
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex-1 min-h-[400px]">
                                <h3 className="text-lg font-bold mb-4 flex justify-between items-center">
                                    <span>👥 學生名冊 ({students.length})</span>
                                    {students.length > 0 && (
                                        <button 
                                            onClick={() => setStudents([])}
                                            className="text-xs text-morandi-clay hover:text-red-400"
                                        >
                                            清空全部
                                        </button>
                                    )}
                                </h3>
                                <div className="space-y-2 max-h-[500px] overflow-y-auto custom-scrollbar pr-2">
                                    {students.length === 0 ? (
                                        <div className="text-center py-12 text-morandi-clay opacity-50 italic">
                                            尚未匯入任何學生
                                        </div>
                                    ) : (
                                        students.map(s => (
                                            <div 
                                                key={s.id}
                                                onClick={() => setSelectedId(s.id)}
                                                className={`p-3 rounded-xl cursor-pointer transition-all border ${
                                                    selectedId === s.id 
                                                    ? 'bg-morandi-oat border-morandi-sage shadow-inner' 
                                                    : 'bg-white border-transparent hover:border-morandi-oat hover:bg-morandi-bg'
                                                } flex justify-between items-center`}
                                            >
                                                <div className="font-medium">{s.name}</div>
                                                <div className="flex items-center gap-2">
                                                    {s.status === 'done' && <span className="text-xs text-green-600 bg-green-50 px-2 py-0.5 rounded-full">已生成</span>}
                                                    {s.status === 'generating' && <span className="text-xs text-blue-600 animate-pulse">處理中...</span>}
                                                    {s.status === 'pending' && <span className="text-xs text-gray-400">未設定</span>}
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Right Column: Settings & Editor */}
                        <div className="lg:col-span-8 space-y-6">
                            {selectedStudent ? (
                                <div className="animate-fade-in space-y-6">
                                    {/* Config Card */}
                                    <div className="bg-white rounded-2xl p-8 shadow-sm border border-gray-100">
                                        <div className="flex justify-between items-start mb-6">
                                            <h2 className="text-2xl font-bold flex items-center gap-2">
                                                <span className="w-10 h-10 bg-morandi-sage text-white rounded-full flex items-center justify-center">{selectedStudent.name[0]}</span>
                                                {selectedStudent.name} 的評語配置
                                            </h2>
                                            <div className="flex items-center gap-4">
                                                <select 
                                                    className="bg-morandi-bg border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-morandi-sage"
                                                    value={globalLength}
                                                    onChange={(e) => setGlobalLength(e.target.value)}
                                                >
                                                    {LENGTHS.map(l => <option key={l.id} value={l.id}>{l.label}</option>)}
                                                </select>
                                                <select 
                                                    className="bg-morandi-bg border-none rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-morandi-sage"
                                                    value={selectedStudent.tone}
                                                    onChange={(e) => updateStudent(selectedId, { tone: e.target.value })}
                                                >
                                                    {TONES.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                                                </select>
                                            </div>
                                        </div>

                                        {/* Trait Matrix */}
                                        <div className="space-y-6">
                                            {TRAIT_CATEGORIES.map(cat => (
                                                <div key={cat.id}>
                                                    <h4 className="text-sm font-bold text-morandi-clay mb-3">{cat.title}</h4>
                                                    <div className="flex flex-wrap gap-2">
                                                        {cat.traits.map(trait => (
                                                            <button 
                                                                key={trait}
                                                                onClick={() => toggleTrait(trait)}
                                                                className={`px-3 py-1 rounded-full border text-sm transition-all ${
                                                                    selectedStudent.traits.includes(trait)
                                                                    ? 'chip-active scale-105'
                                                                    : 'bg-morandi-bg border-transparent hover:border-morandi-sage'
                                                                }`}
                                                            >
                                                                {trait}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                            
                                            {/* Custom Traits Area */}
                                            <div>
                                                <h4 className="text-sm font-bold text-morandi-clay mb-3">🏷️ 自訂標籤</h4>
                                                <div className="flex flex-wrap gap-2 mb-3">
                                                    {selectedStudent.customTraits.map(trait => (
                                                        <button 
                                                            key={trait}
                                                            onClick={() => removeCustomTag(trait)}
                                                            className="chip-custom px-3 py-1 rounded-full border text-sm flex items-center gap-1 group"
                                                        >
                                                            {trait} <span className="opacity-50 group-hover:opacity-100">×</span>
                                                        </button>
                                                    ))}
                                                    <input 
                                                        type="text"
                                                        placeholder="+ 自訂標籤 (Enter 新增)"
                                                        value={customTagInput}
                                                        onChange={(e) => setCustomTagInput(e.target.value)}
                                                        onKeyDown={addCustomTag}
                                                        className="px-3 py-1 rounded-full bg-transparent border border-dashed border-morandi-sage text-sm focus:outline-none focus:border-solid w-40"
                                                    />
                                                </div>
                                            </div>
                                        </div>

                                        <div className="mt-8 border-t pt-6">
                                            <h4 className="text-sm font-bold text-morandi-clay mb-3 flex items-center gap-2">
                                                <span>📝 導師補充備忘/特定事件建議</span>
                                            </h4>
                                            <textarea 
                                                className="w-full h-24 p-4 border rounded-xl bg-morandi-bg focus:ring-2 focus:ring-morandi-sage outline-none text-sm resize-none"
                                                placeholder="輸入具體事蹟或特別建議（例如：數學成績進步明顯、在運動會表現出色...）"
                                                value={selectedStudent.teacherNote}
                                                onChange={(e) => updateStudent(selectedId, { teacherNote: e.target.value })}
                                            />
                                        </div>

                                        <button 
                                            onClick={() => generateComment(selectedId)}
                                            disabled={isGenerating || !apiKey}
                                            className={`w-full mt-6 py-4 rounded-xl font-bold text-lg transition-all shadow-md ${
                                                isGenerating 
                                                ? 'bg-morandi-clay cursor-not-allowed text-white' 
                                                : 'bg-morandi-sage text-white hover:scale-[1.01] active:scale-95'
                                            }`}
                                        >
                                            {isGenerating ? '老師辛苦了，評語撰寫中...' : '✨ 生成 AI 專業評語'}
                                        </button>
                                    </div>

                                    {/* Output Card */}
                                    {(selectedStudent.comment || selectedStudent.status === 'generating') && (
                                        <div className="bg-white rounded-2xl p-8 shadow-sm border border-morandi-oat relative">
                                            <div className="flex justify-between items-center mb-4">
                                                <h3 className="font-bold text-lg">撰寫成果</h3>
                                                <div className="flex gap-2">
                                                    {selectedStudent.history.length > 0 && (
                                                        <button 
                                                            onClick={() => rollback(selectedId)}
                                                            className="px-3 py-1 text-xs border border-morandi-clay text-morandi-clay rounded-lg hover:bg-morandi-bg transition-colors"
                                                            title="恢復至上一次生成的內容"
                                                        >
                                                            🔙 復原
                                                        </button>
                                                    )}
                                                    <button 
                                                        onClick={() => generateComment(selectedId, true)}
                                                        className="px-3 py-1 text-xs bg-morandi-oat text-morandi-dark rounded-lg hover:bg-morandi-sage hover:text-white transition-colors"
                                                    >
                                                        🔄 重新生成
                                                    </button>
                                                </div>
                                            </div>

                                            {selectedStudent.status === 'generating' ? (
                                                <div className="py-12 flex flex-col items-center justify-center gap-4">
                                                    <div className="w-12 h-12 border-4 border-morandi-oat border-t-morandi-sage rounded-full animate-spin"></div>
                                                    <p className="text-morandi-clay">精心推敲措辭中...</p>
                                                </div>
                                            ) : (
                                                <div className="space-y-4">
                                                    <div className="bg-morandi-bg p-6 rounded-xl text-morandi-dark leading-relaxed whitespace-pre-wrap min-h-[100px]">
                                                        {selectedStudent.comment}
                                                    </div>
                                                    <div className="flex justify-end">
                                                        <button 
                                                            onClick={() => {
                                                                navigator.clipboard.writeText(selectedStudent.comment);
                                                                alert('已複製到剪貼簿');
                                                            }}
                                                            className="text-morandi-sage text-sm font-medium hover:underline flex items-center gap-1"
                                                        >
                                                            <span>📋 複製此段</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-morandi-clay opacity-60 py-20 bg-white/50 rounded-3xl border border-dashed border-morandi-sage">
                                    <div className="text-6xl mb-4">🎓</div>
                                    <h2 className="text-xl font-medium">請從左側名單選擇或匯入學生</h2>
                                    <p className="mt-2">開始為孩子們撰寫專屬評語</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
